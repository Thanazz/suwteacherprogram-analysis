<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found</title>
  <meta name="description" content="The page you requested could not be found. Please go back to the homepage." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #1e3a5f;
      --blue:   #2d5fa8;
      --teal:   #43cea2;
      --light:  #f0f4f8;
      --muted:  #6b7a99;
      --white:  #ffffff;
      --circle-bg: #eef2f7;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* ── Card ─────────────────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,.10), 0 2px 12px rgba(0,0,0,.06);
      padding: 5rem 5.5rem;
      max-width: 960px;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 5rem;
      position: relative;
      overflow: hidden;
    }

    /* subtle shimmer strip at the top */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--teal), var(--blue));
    }

    /* ── Illustration side ────────────────────────────── */
    .illustration {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .circle-bg {
      width: 280px;
      height: 280px;
      background: var(--circle-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* floating boat animation */
    .boat-wrap {
      position: relative;
      animation: float 3.6s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }

    /* water ripple rings */
    .ripple-group {
      position: absolute;
      bottom: 38px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 26px;
    }

    .ripple {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%,-50%);
      border-radius: 50%;
      border: 1.8px solid var(--navy);
      opacity: 0;
      animation: ripple-out 2.8s ease-out infinite;
    }
    .ripple:nth-child(1) { width: 50px;  height: 16px; animation-delay: 0s;    }
    .ripple:nth-child(2) { width: 90px;  height: 24px; animation-delay: .6s;   }
    .ripple:nth-child(3) { width: 130px; height: 32px; animation-delay: 1.2s;  }

    @keyframes ripple-out {
      0%   { opacity: .7; transform: translate(-50%,-50%) scale(.6); }
      100% { opacity: 0;  transform: translate(-50%,-50%) scale(1);  }
    }

    /* ── Text side ────────────────────────────────────── */
    .content {
      flex: 1;
    }

    .error-code {
      font-size: clamp(4.5rem, 10vw, 7rem);
      font-weight: 900;
      color: var(--navy);
      line-height: 1;
      letter-spacing: -2px;
    }

    .error-title {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--navy);
      margin-top: .3rem;
      margin-bottom: .9rem;
    }

    .error-desc {
      font-size: .93rem;
      color: var(--muted);
      line-height: 1.65;
      max-width: 320px;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      margin-top: 1.8rem;
      padding: .75rem 2.2rem;
      background: var(--navy);
      color: var(--white);
      font-size: .92rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: .04em;
      transition: background .25s, transform .2s, box-shadow .25s;
    }
    .btn-home:hover {
      background: var(--blue);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(45,95,168,.35);
    }
    .btn-home:active { transform: translateY(0); }

    /* arrow icon */
    .btn-home svg {
      width: 16px; height: 16px;
      transition: transform .25s;
    }
    .btn-home:hover svg { transform: translateX(3px); }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 620px) {
      .card {
        flex-direction: column;
        padding: 2.5rem 1.75rem;
        gap: 2rem;
        text-align: center;
      }
      .error-desc { max-width: 100%; }
      .btn-home { margin: 1.4rem auto 0; }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Left: illustration -->
    <div class="illustration">
      <div class="circle-bg">

        <!-- Paper boat SVG -->
        <div class="boat-wrap">
          <svg width="120" height="90" viewBox="0 0 120 90" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- Boat hull -->
            <path d="M10 58 Q60 80 110 58 L95 45 H25 L10 58Z" fill="#1e3a5f"/>
            <!-- Hull highlight -->
            <path d="M25 52 Q60 66 95 52" stroke="#2d5fa8" stroke-width="1.5" fill="none" opacity=".5"/>
            <!-- Left sail panel -->
            <path d="M55 12 L30 48 L55 48 Z" fill="#2d5fa8"/>
            <!-- Right sail panel -->
            <path d="M60 12 L85 48 L60 48 Z" fill="#1e3a5f"/>
            <!-- Mast crease line -->
            <line x1="57.5" y1="10" x2="57.5" y2="48" stroke="#ffffff" stroke-width="1" opacity=".4"/>
          </svg>
        </div>

        <!-- Water ripples below boat -->
        <div class="ripple-group">
          <div class="ripple"></div>
          <div class="ripple"></div>
          <div class="ripple"></div>
        </div>

      </div>
    </div>

    <!-- Right: text -->
    <div class="content">
      <div class="error-code">404</div>
      <div class="error-title">Page Not Found</div>
      <p class="error-desc">
        We're sorry, the page you requested could not be found.<br/>
      </p>
    </div>

  </div>

</body>
</html>
